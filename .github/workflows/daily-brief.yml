name: Daily Intelligence Brief

on:
  schedule:
    # 目前設定：UTC 23:00 (台灣時間週一到週五早上 07:00)
    # 若要改台灣晚上 11 點，請改成: - cron: '0 15 * * 1-5'
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
    inputs:
      command:
        description: '執行命令'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - test-data
          - test-regime
      date:
        description: '指定日期 (YYYY-MM-DD)，留空=今天'
        required: false
        type: string

concurrency:
  group: daily-intelligence-brief-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preflight
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          COMMAND="${{ inputs.command || 'daily' }}"
          if [ "$COMMAND" = "daily" ]; then
            python main.py doctor
          else
            echo "Skipping daily preflight for command: $COMMAND"
          fi

      - name: Run Brief
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          # 使用新版 inputs 語法，排程自動觸發時若為空，預設使用 'daily'
          COMMAND="${{ inputs.command || 'daily' }}"
          
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi
          
          echo "Running command: $COMMAND $DATE_ARG"
          python main.py $COMMAND $DATE_ARG
